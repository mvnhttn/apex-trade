<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TRADING — Professional Markets</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #080b0f;
    --bg-secondary: #0d1117;
    --bg-card: #111820;
    --bg-hover: #161e28;
    --border: #1e2d3d;
    --border-bright: #2a3f55;
    --text-primary: #e8f4f8;
    --text-secondary: #7a9bb5;
    --text-muted: #3d5a73;
    --accent-cyan: #00d4ff;
    --accent-green: #00ff88;
    --accent-red: #ff3b5c;
    --accent-gold: #ffd700;
    --accent-orange: #ff8c42;
    --glow-cyan: 0 0 20px rgba(0,212,255,0.3);
    --glow-green: 0 0 20px rgba(0,255,136,0.3);
    --glow-red: 0 0 20px rgba(255,59,92,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,11,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent-cyan);
    text-shadow: var(--glow-cyan);
  }

  .logo span { color: var(--text-secondary); }

  .header-ticker {
    display: flex;
    gap: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .ticker-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .ticker-name { color: var(--text-muted); letter-spacing: 1px; }
  .ticker-price { color: var(--text-primary); font-weight: 700; }
  .ticker-change.up { color: var(--accent-green); }
  .ticker-change.down { color: var(--accent-red); }

  .header-time {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  /* LAYOUT */
  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 64px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 8px 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .asset-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }

  .asset-item:hover { background: var(--bg-hover); border-color: var(--border); }
  .asset-item.active { background: rgba(0,212,255,0.07); border-color: rgba(0,212,255,0.3); }

  .asset-left { display: flex; align-items: center; gap: 10px; }

  .asset-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
  }

  .asset-icon.gold { background: rgba(255,215,0,0.15); color: var(--accent-gold); }
  .asset-icon.silver { background: rgba(192,192,192,0.15); color: #c0c0c0; }
  .asset-icon.copper { background: rgba(255,140,66,0.15); color: var(--accent-orange); }
  .asset-icon.btc { background: rgba(247,147,26,0.15); color: #f7931a; }
  .asset-icon.eth { background: rgba(98,126,234,0.15); color: #627eea; }
  .asset-icon.stock { background: rgba(0,212,255,0.1); color: var(--accent-cyan); font-size: 9px; }

  .asset-name { font-size: 13px; font-weight: 700; }
  .asset-sub { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 1px; }

  .asset-right { text-align: right; }
  .asset-price { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; }
  .asset-pct { font-family: 'Space Mono', monospace; font-size: 10px; margin-top: 2px; }
  .asset-pct.up { color: var(--accent-green); }
  .asset-pct.down { color: var(--accent-red); }

  /* SIGNAL BADGE */
  .signal-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
  }
  .signal-badge.buy { background: rgba(0,255,136,0.15); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.3); }
  .signal-badge.sell { background: rgba(255,59,92,0.15); color: var(--accent-red); border: 1px solid rgba(255,59,92,0.3); }
  .signal-badge.hold { background: rgba(255,215,0,0.15); color: var(--accent-gold); border: 1px solid rgba(255,215,0,0.3); }
  .signal-badge.watch { background: rgba(0,212,255,0.1); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.2); }

  /* MAIN CONTENT */
  .main {
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* ASSET HEADER */
  .asset-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .asset-header-left h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .asset-header-left p {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 4px;
  }

  .price-display {
    text-align: right;
  }

  .price-big {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent-cyan);
    text-shadow: var(--glow-cyan);
  }

  .price-change {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    margin-top: 4px;
  }

  .price-change.up { color: var(--accent-green); }
  .price-change.down { color: var(--accent-red); }

  /* SIGNAL PANEL */
  .signal-panel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .signal-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }

  .signal-card:hover { border-color: var(--border-bright); }

  .signal-card.buy-card { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.04); }
  .signal-card.sell-card { border-color: rgba(255,59,92,0.3); background: rgba(255,59,92,0.04); }

  .signal-card-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .signal-card-value {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .signal-card-value.green { color: var(--accent-green); }
  .signal-card-value.red { color: var(--accent-red); }
  .signal-card-value.gold { color: var(--accent-gold); }
  .signal-card-value.cyan { color: var(--accent-cyan); }

  .signal-card-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
  }

  /* CHART */
  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-secondary);
  }

  .timeframe-buttons {
    display: flex;
    gap: 4px;
  }

  .tf-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .tf-btn:hover, .tf-btn.active {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.4);
    color: var(--accent-cyan);
  }

  canvas { width: 100% !important; }

  /* INDICATORS GRID */
  .indicators-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .indicator-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .ind-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .ind-name {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .ind-value {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .ind-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .ind-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .ind-interpretation {
    font-size: 11px;
    font-weight: 600;
  }

  /* SUPPORT/RESISTANCE */
  .levels-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .level-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .level-row:last-child { border-bottom: none; }
  .level-label { color: var(--text-secondary); font-size: 10px; }
  .level-price { font-weight: 700; }
  .level-price.resistance { color: var(--accent-red); }
  .level-price.support { color: var(--accent-green); }
  .level-price.current { color: var(--accent-cyan); }

  /* RIGHT PANEL */
  .right-panel {
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-track { background: transparent; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .panel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .panel-card-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* FUNDAMENTALS */
  .fundamental-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,45,61,0.5);
    font-size: 12px;
  }

  .fundamental-row:last-child { border-bottom: none; }
  .fund-label { color: var(--text-secondary); }
  .fund-value { font-family: 'Space Mono', monospace; font-weight: 700; }
  .fund-value.positive { color: var(--accent-green); }
  .fund-value.negative { color: var(--accent-red); }

  /* ANALYST TARGETS */
  .analyst-bar-container { margin: 12px 0; }
  .analyst-label-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    margin-bottom: 6px;
  }
  .analyst-bar-bg {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .analyst-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent-red), var(--accent-gold), var(--accent-green));
  }
  .analyst-needle {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 14px;
    background: white;
    border-radius: 1px;
    transform: translateX(-50%);
  }

  /* NEWS */
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .news-item:last-child { border-bottom: none; }
  .news-headline { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
  .news-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); }
  .news-sentiment {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .news-sentiment.positive { background: var(--accent-green); }
  .news-sentiment.negative { background: var(--accent-red); }
  .news-sentiment.neutral { background: var(--text-muted); }

  /* SIGNAL SUMMARY */
  .signal-summary {
    text-align: center;
    padding: 16px;
  }

  .signal-big {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .signal-big.BUY { color: var(--accent-green); text-shadow: var(--glow-green); }
  .signal-big.SELL { color: var(--accent-red); text-shadow: var(--glow-red); }
  .signal-big.HOLD { color: var(--accent-gold); }
  .signal-big.WATCH { color: var(--accent-cyan); text-shadow: var(--glow-cyan); }

  .signal-score {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .signal-reasons { text-align: left; }
  .signal-reason {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 4px 0;
    color: var(--text-secondary);
  }

  .signal-reason::before {
    content: '▸';
    color: var(--accent-cyan);
    font-size: 10px;
  }

  /* ENTRY ZONES */
  .entry-zone {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid;
  }
  .entry-zone.buy { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }
  .entry-zone.wait { border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.05); }
  .entry-zone-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .entry-zone.buy .entry-zone-label { color: var(--accent-green); }
  .entry-zone.wait .entry-zone-label { color: var(--accent-gold); }
  .entry-zone-price {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
  }
  .entry-zone-desc { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

  /* PROGRESS BAR for RSI etc */
  .rsi-low { background: var(--accent-green); }
  .rsi-mid { background: var(--accent-gold); }
  .rsi-high { background: var(--accent-red); }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tab-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 16px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn.active {
    color: var(--accent-cyan);
    border-bottom-color: var(--accent-cyan);
  }

  /* LOADING PULSE */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 8px var(--accent-green);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 1200px) {
    .app { grid-template-columns: 220px 1fr; }
    .right-panel { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">APEX<span>TRADE</span></div>
  <div class="header-ticker" id="headerTicker"></div>
  <div class="header-time">
    <div><span class="live-dot"></span><span id="liveTime"></span></div>
    <div style="color: var(--text-muted); font-size: 10px; margin-top: 2px;">LIVE MARKETS</div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="section-label">Rohstoffe</div>
    <div id="commodityList"></div>

    <div id="cryptoList"></div>
    <div class="section-label" style="margin-top:8px;">Aktien</div>
    <div id="stockList"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel"></div>
</div>

// HELPERS

function fmt(n, decimals=2) {
  if(typeof n !== 'number') return n;
  return n.toLocaleString('de-DE', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function getSignalColor(signal) {
  const map = { 'BUY': 'var(--accent-green)', 'SELL': 'var(--accent-red)', 'HOLD': 'var(--accent-gold)', 'WATCH': 'var(--accent-cyan)' };
  return map[signal] || 'var(--text-primary)';
}

function getRSIColor(rsi) {
  if(rsi < 35) return 'var(--accent-green)';
  if(rsi > 70) return 'var(--accent-red)';
  return 'var(--accent-gold)';
}

function getRSIText(rsi) {
  if(rsi < 30) return 'STARK ÜBERVERKAUFT';
  if(rsi < 40) return 'Überverkauft';
  if(rsi < 60) return 'Neutral';
  if(rsi < 70) return 'Leicht überkauft';
  if(rsi < 80) return 'Überkauft';
  return 'STARK ÜBERKAUFT';
}

function generateChartData(basePrice, days=60) {
  const data = [];
  let price = basePrice * 0.85;
  for(let i = 0; i < days; i++) {
    price *= (1 + (Math.random() - 0.47) * 0.025);
    data.push(+price.toFixed(2));
  }
  data[data.length-1] = basePrice;
  return data;
}

function generateLabels(days=60) {
  const labels = [];
  const now = new Date();
  for(let i = days-1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    labels.push(d.toLocaleDateString('de-DE', { day:'2-digit', month:'short' }));
  }
  return labels;
}

        <span class="level-price current">${a.type==='crypto'&&a.price>1000?'$'+fmt(a.price,0):'$'+fmt(a.price)}</span>
        <span style="font-size:10px;color:var(--accent-cyan)">LIVE</span>
      </div>
      <div class="level-row">
        <span class="level-label">SUPPORT 1</span>
        <span class="level-price support">${a.type==='crypto'&&a.support1>1000?'$'+fmt(a.support1,0):'$'+fmt(a.support1)}</span>
        <span style="font-size:10px;color:var(--text-muted)">${fmt((a.support1/a.price-1)*100,1)}%</span>
      </div>
      <div class="level-row">
        <span class="level-label">SUPPORT 2</span>
        <span class="level-price support">${a.type==='crypto'&&a.support2>1000?'$'+fmt(a.support2,0):'$'+fmt(a.support2)}</span>
        <span style="font-size:10px;color:var(--text-muted)">${fmt((a.support2/a.price-1)*100,1)}%</span>
      </div>
    </div>
  `;

  renderChart(30);
}

function renderIndicatorCard(name, value, unit, min, max, color, interpretation, midpoint=50, showBar=true) {
  const pct = showBar ? Math.min(100, Math.max(0, ((value-min)/(max-min))*100)) : 50;
  return `
    <div class="indicator-card">
      <div class="ind-header">
        <span class="ind-name">${name}</span>
        <span class="signal-badge hold" style="font-size:8px">${interpretation.split(' ')[0]}</span>
      </div>
      <div class="ind-value" style="color:${color}">${typeof value==='number'&&value>100?fmt(value,0):fmt(value,1)}${unit}</div>
      ${showBar ? `
        <div class="ind-bar">
          <div class="ind-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      ` : '<div style="height:10px"></div>'}
      <div class="ind-interpretation" style="color:${color};font-size:11px">${interpretation}</div>
    </div>
  `;
}

function getSignalReasons(a) {
  const reasons = [];
  if(a.rsi < 40) reasons.push('RSI überverkauft');
  else if(a.rsi > 70) reasons.push('RSI überkauft – Vorsicht');
  else reasons.push('RSI neutral – OK');
  if(a.price > a.ma50) reasons.push('Über MA50 – Bullisch');
  else reasons.push('Unter MA50');
  if(a.macd === 'Bullish') reasons.push('MACD bullisch');
  else if(a.macd === 'Bearish') reasons.push('MACD bearisch');
  reasons.push(`Support bei ${a.type==='crypto'&&a.support1>1000?'$'+fmt(a.support1,0):'$'+fmt(a.support1)}`);
  return reasons;
}

// ═══════════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════════
function renderChart(days) {
  if(chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const canvas = document.getElementById('priceChart');
  if(!canvas) return;
  const a = selectedAsset;
  const data = generateChartData(a.price, days);
  const labels = generateLabels(days);
  const gradient = canvas.getContext('2d').createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(0,212,255,0.3)');
  gradient.addColorStop(1, 'rgba(0,212,255,0)');

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: a.symbol,
        data,
        borderColor: 'rgba(0,212,255,0.8)',
        backgroundColor: gradient,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111820',
          borderColor: '#1e2d3d',
          borderWidth: 1,
          titleColor: '#7a9bb5',
          bodyColor: '#e8f4f8',
          bodyFont: { family: 'Space Mono', size: 11 },
          callbacks: {
            label: ctx => ' ' + (a.type==='crypto'&&ctx.raw>1000?'$'+fmt(ctx.raw,0):'$'+fmt(ctx.raw))
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,45,61,0.5)', drawBorder: false },
          ticks: { color: '#3d5a73', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 8 }
        },
        y: {
          grid: { color: 'rgba(30,45,61,0.5)', drawBorder: false },
          ticks: { color: '#3d5a73', font: { family: 'Space Mono', size: 9 }, callback: v => a.type==='crypto'&&v>1000?'$'+fmt(v,0):'$'+fmt(v) }
        }
      }
    }
  });
}

function updateChart(tf, btn) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const days = { '1M':30, '3M':90, '6M':180, '1J':365 }[tf];
  renderChart(days);
}

// ═══════════════════════════════════════════════
// RIGHT PANEL
// ═══════════════════════════════════════════════
function renderRightPanel() {
  const a = selectedAsset;
  const panel = document.getElementById('rightPanel');
  const pct = Math.min(95, Math.max(5, ((a.analystCurrent - a.analystLow) / (a.analystHigh - a.analystLow)) * 100));
  const reasons = getSignalReasons(a);

  panel.innerHTML = `
    <!-- SIGNAL SUMMARY -->

        <div class="signal-reasons">
          ${reasons.map(r => `<div class="signal-reason">${r}</div>`).join('')}

      </div>
    </div>

    <!-- ENTRY ZONES -->
    <div class="panel-card fade-in">

      <div class="entry-zone ${a.signal==='BUY'?'buy':'wait'}">
        <div class="entry-zone-label">${a.signal==='BUY'?'✓ IDEALER EINSTIEG':'⏳ WARTE AUF PULLBACK'}</div>
        <div class="entry-zone-price">${a.entry1}</div>
        <div class="entry-zone-desc">1. Einstiegszone – Erstes Support-Level</div>
      </div>
      <div class="entry-zone buy">
        <div class="entry-zone-label">✓ STARKER EINSTIEG</div>
        <div class="entry-zone-price">${a.entry2}</div>
        <div class="entry-zone-desc">2. Einstiegszone – Tieferes Support-Level</div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-family:'Space Mono',monospace;font-size:11px;">
        <div>
          <div style="color:var(--text-muted);font-size:9px;margin-bottom:3px">STOP-LOSS</div>
          <div style="color:var(--accent-red)">${a.stop}</div>
        </div>
        <div style="text-align:right">
          <div style="color:var(--text-muted);font-size:9px;margin-bottom:3px">TARGET</div>
          <div style="color:var(--accent-green)">${a.target}</div>
        </div>
      </div>
    </div>

    <!-- ANALYST TARGETS -->
    <div class="panel-card fade-in">
      <div class="panel-card-title">ANALYSTEN-KURSZIELE</div>
      <div class="analyst-bar-container">
        <div class="analyst-label-row">
          <span style="color:var(--accent-red)">Tief: ${a.type==='crypto'&&a.analystLow>1000?'$'+fmt(a.analystLow,0):'$'+fmt(a.analystLow)}</span>
          <span style="color:var(--accent-gold)">Ø: ${a.type==='crypto'&&a.analystMid>1000?'$'+fmt(a.analystMid,0):'$'+fmt(a.analystMid)}</span>
          <span style="color:var(--accent-green)">Hoch: ${a.type==='crypto'&&a.analystHigh>1000?'$'+fmt(a.analystHigh,0):'$'+fmt(a.analystHigh)}</span>
        </div>
        <div class="analyst-bar-bg">
          <div class="analyst-bar-fill" style="width:100%"></div>
          <div class="analyst-needle" style="left:${pct}%"></div>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);text-align:center;margin-top:4px;">
          AKTUELL: ${a.type==='crypto'&&a.analystCurrent>1000?'$'+fmt(a.analystCurrent,0):'$'+fmt(a.analystCurrent)} (${pct.toFixed(0)}. Percentile)
        </div>
      </div>
    </div>

    <!-- FUNDAMENTALS -->
    ${a.type === 'stock' ? `
    <div class="panel-card fade-in">

        <span class="fund-value">${a.marketCap}</span>
      </div>
      <div class="fundamental-row">
        <span class="fund-label">Umsatz (TTM)</span>

      </div>

    <!-- NEWS -->

      <div class="panel-card-title">AKTUELLE NEWS</div>
      ${a.news.map(n => `

// ═══════════════════════════════════════════════
// PRICE SIMULATION (subtle live price movement)
// ═══════════════════════════════════════════════
function simulateLivePrices() {
  setInterval(() => {
    const all = [...ASSETS.commodities, ...ASSETS.crypto, ...ASSETS.stocks];
    all.forEach(a => {
      const move = (Math.random() - 0.498) * 0.001;
      a.price = +(a.price * (1 + move)).toFixed(a.price > 1000 ? 0 : a.price > 10 ? 2 : 3);
      const origChange = a.change;
      a.change = +(a.change + (Math.random() - 0.5) * 0.05).toFixed(2);
    });

    // Update live price display
    const liveEl = document.getElementById('livePriceDisplay');
    if(liveEl) {
      const a = selectedAsset;
      liveEl.textContent = a.type==='crypto'&&a.price>1000?'$'+fmt(a.price,0):'$'+fmt(a.price);
    }

    renderHeaderTicker();
    renderSidebar();
  }, 2000);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderHeaderTicker();
  renderSidebar();
  renderMain();
  renderRightPanel();
  updateClock();
  setInterval(updateClock, 1000);
  simulateLivePrices();
});
</script>
